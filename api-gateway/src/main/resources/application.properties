spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=ms-usuarios
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ms-usuarios
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.server.webflux.routes[1].id=ms-tickets
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ms-tickets
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/tickets/**

spring.cloud.gateway.server.webflux.routes[2].id=ms-historial
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ms-historial
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/historial/**