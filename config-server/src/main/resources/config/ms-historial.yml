server:
  port: 8083

spring:
  application:
    name: ms-historial
  datasource:
    url: jdbc:mysql://localhost:3306/historial_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  mensaje:
    bienvenida: "Servicio de Historial activo"