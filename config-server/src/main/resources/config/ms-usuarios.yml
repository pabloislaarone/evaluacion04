server:
  port: 8081

spring:
  application:
    name: ms-usuarios
  datasource:
    url: jdbc:mysql://localhost:3306/usuarios_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  mensaje:
    bienvenida: "Servicio de Usuarios activo"

info:
  app:
    name: ms-usuarios
    description: Servicio de gestion de usuarios y autenticacion
    version: 1.0.0

