spring.application.name=ms-tickets
spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

resilience4j.circuitbreaker.instances.usuarioClient.sliding-window-size=5
resilience4j.circuitbreaker.instances.usuarioClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.usuarioClient.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.usuarioClient.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.usuarioClient.automatic-transition-from-open-to-closed-enabled=true

resilience4j.retry.instances.usuarioClient.max-attempts=3
resilience4j.retry.instances.usuarioClient.wait-duration=2000