spring.application.name=ms-historial
spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

resilience4j.circuitbreaker.instances.ticketClient.sliding-window-size=5
resilience4j.circuitbreaker.instances.ticketClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ticketClient.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.ticketClient.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.usuarioClient.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.ticketClient.max-attempts=3
resilience4j.retry.instances.ticketClient.wait-duration=2000